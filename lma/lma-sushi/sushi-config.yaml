id: sis.se.tk334.ag10.lma
canonical: https://sis.se/fhir/lma
name: LMAApiStandard
title: "LMA API-standard – FHIR Implementation Guide"
description: >-
  FHIR Implementation Guide för SIS/TR API-standard för läkemedelsautomater.
  Specificerar hur informationsmodellen för läkemedelsautomater realiseras med
  HL7 FHIR R4 för datautbyte mellan LMA-plattformar och konsumerande system.
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2025+
releaseLabel: draft
publisher:
  name: SIS/TK334 AG10
  url: https://sis.se
  email: fhir@sis.se
jurisdiction: urn:iso:std:iso:3166#SE "Sweden"
license: CC0-1.0

dependencies:

parameters:
  apply-publisher: true
  apply-version: true
  path-resource:
    - input/resources
    - fsh-generated/resources
  path-pages:
    - input/pagecontent
    - fsh-generated/includes
  path-expansion-params: '../../input/_resources/exp-params.json'
  show-inherited-invariants: false
  usage-stats-opt-out: true
  excludettl: true

