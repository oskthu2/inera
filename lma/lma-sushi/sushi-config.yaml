    title: Alla artefakter

# ─── GROUPS ─────────────────────────────────────────────────────────────────
groups:
  ProfilesCore:
    name: "Profiler – Kärnmodell"
    description: >-
      Profiler för de kärnklasser som ingår i alla LMA-implementeringar.
    resources:
      - StructureDefinition/LMABrukare
      - StructureDefinition/LMAAutomat
      - StructureDefinition/LMAKoppling
      - StructureDefinition/LMALakemedelsoverlamnande
      - StructureDefinition/LMALakemedelsadministrering
      - StructureDefinition/LMAPafyllnad

  Extensions:
    name: "Extensions"
    description: Extensions specifika för LMA-standarden.
    resources:
      - StructureDefinition/ext-lma-batch

  Terminology:
    name: "Terminologi"
    description: CodeSystems och ValueSets med lagerindelad termbindning.
    resources:
      - CodeSystem/lma-driftsstatus
      - CodeSystem/lma-anslutningsstatus
      - CodeSystem/lma-kopplingsstatus
      - CodeSystem/lma-overlamningstfall
      - CodeSystem/lma-overlamninsfelkod
      - CodeSystem/lma-administreringsstatus
      - CodeSystem/lma-administreringsorsak
      - ValueSet/VS-Driftsstatus
      - ValueSet/VS-Anslutningsstatus
      - ValueSet/VS-Kopplingsstatus
      - ValueSet/VS-Overlamningstfall
      - ValueSet/VS-Overlamninsfelkod
      - ValueSet/VS-Administreringsstatus
      - ValueSet/VS-Administreringsorsak

  Examples:
    name: "Exempelinstanser"
    description: Exempelinstanser för alla kärnprofiler.
    resources:
      - Patient/example-brukare-01
      - Device/example-automat-01
      - DeviceUseStatement/example-koppling-01
      - MedicationDispense/example-overlamnande-01
      - MedicationAdministration/example-administrering-01
      - SupplyDelivery/example-pafyllnad-01
