name: Publish IGs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_TITLE: Inera Implementation Guides
      TERMINOLOGY_SERVER: n/a
      IG_PUBLISHER_IMAGE: hl7fhir/ig-publisher-base@sha256:d2917c07bbb1672acc6bbb1177e3ee80a4d79731a2608632a444af263235b369

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build all IGs
        run: bash .github/scripts/build-pages.sh "$GITHUB_WORKSPACE"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
